# cf-invariants-verus-bridge-conservation — Foundry config
#
# Tracks chimera-template-pack's pinning: solc 0.8.28, fuzz runs sized for
# CI-friendly campaigns. The harness uses standard Recon Chimera remappings.

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"

solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false

ffi = false

[fuzz]
runs = 1000

[invariant]
runs = 256
depth = 50
fail_on_revert = false
call_override = false
dictionary_weight = 80
include_storage = true
include_push_bytes = true
